version: '3.8'
services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
